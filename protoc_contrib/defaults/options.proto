syntax = "proto2";
package protoc_contrib.defaults;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/protoc-contrib/protoc-gen-go-defaults/protoc_contrib/defaults;defaults";

// Default values applied at the message level
extend google.protobuf.MessageOptions {
  // Skip suppresses SetDefaults() generation for this message entirely,
  // so a caller can provide a hand-written method instead.
  optional bool skip = 55003;
  // Unexported emits _SetDefaults() instead of SetDefaults(). Useful when
  // a caller wants to compose custom logic around the generated body by
  // writing a SetDefaults() that delegates to the generated method.
  optional bool unexported = 55004;
}

// Default values applied at the oneof level
extend google.protobuf.OneofOptions {
  optional string oneof = 55002;
}

// Default values applied at the field level
extend google.protobuf.FieldOptions {
  // Value specify the default value to set on this field. By default,
  // none is set on a field.
  optional FieldDefaults value = 55001;
}

// FieldDefaults encapsulates the default values for each type of field. Depending on the
// field, the correct set should be used to ensure proper defaults generation.
message FieldDefaults {
  option (skip) = true;
  oneof type {
    // Scalar Field Types
    float float = 1;
    double double = 2;
    int32 int32 = 3;
    int64 int64 = 4;
    uint32 uint32 = 5;
    uint64 uint64 = 6;
    sint32 sint32 = 7;
    sint64 sint64 = 8;
    fixed32 fixed32 = 9;
    fixed64 fixed64 = 10;
    sfixed32 sfixed32 = 11;
    sfixed64 sfixed64 = 12;
    bool bool = 13;
    string string = 14;
    bytes bytes = 15;

    // Complex Field Types
    uint32 enum = 16;
    MessageDefaults message = 17;
    // repeated = 18;
    // map      = 19;

    // Well-Known Field Types
    // any       = 20;
    string duration = 21;
    string timestamp = 22;

    // EnumName sets the default enum value by symbolic name. Prefer this
    // over `enum` when reordering would silently invalidate a numeric
    // default; unknown names fail loudly at generate time.
    string enum_name = 23;
  }
  reserved 18 to 20;
}

// MessageDefaults define the default behaviour for this field.
message MessageDefaults {
  option (skip) = true;
  // Initialize specify that the message should be initialized
  optional bool initialize = 1;
  // Recurse specifies that the nested message's own SetDefaults() method
  // should be invoked after initialization.
  optional bool recurse = 2;
}
